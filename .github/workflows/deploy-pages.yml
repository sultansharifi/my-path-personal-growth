name: Deploy both versions to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            persian/package-lock.json
            english/package-lock.json
      - name: Build Persian version
        working-directory: persian
        env:
          NEXT_PUBLIC_BASE_PATH: /my-path-personal-growth/persian
        run: |
          npm ci
          npm test
          npm run build
      - name: Build English version
        working-directory: english
        env:
          NEXT_PUBLIC_BASE_PATH: /my-path-personal-growth/english
        run: |
          npm ci
          npm test
          npm run build
      - name: Assemble website
        shell: bash
        run: |
          mkdir -p _site/persian _site/english
          cp -R persian/out/. _site/persian/
          cp -R english/out/. _site/english/
          cp site-index.html _site/index.html
          touch _site/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
