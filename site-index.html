<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>مسیر من | My Path</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        height: 100%;
        font-family: "Segoe UI", Tahoma, "Vazirmatn", system-ui, sans-serif;
      }
      body {
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background:
          radial-gradient(circle at 15% 20%, #6f8cff33 0, transparent 45%),
          radial-gradient(circle at 85% 80%, #a78bfa33 0, transparent 45%),
          linear-gradient(160deg, #0b1224 0%, #131b34 55%, #1a2340 100%);
        overflow: hidden;
      }
      .orb {
        position: fixed;
        border-radius: 50%;
        filter: blur(60px);
        opacity: .55;
        z-index: 0;
      }
      .orb-1 { width: 340px; height: 340px; background: #5b8cff; top: -100px; left: -80px; }
      .orb-2 { width: 300px; height: 300px; background: #9d7bff; bottom: -110px; right: -90px; }

      .card {
        position: relative;
        z-index: 1;
        width: min(440px, 100%);
        padding: 44px 34px 38px;
        border-radius: 28px;
        text-align: center;
        background: rgba(255,255,255,.06);
        border: 1px solid rgba(255,255,255,.14);
        box-shadow: 0 30px 90px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.12);
        backdrop-filter: blur(22px) saturate(160%);
        -webkit-backdrop-filter: blur(22px) saturate(160%);
        animation: rise .5s cubic-bezier(.22,1,.36,1);
      }
      @keyframes rise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

      .mark {
        width: 60px; height: 60px; margin: 0 auto 20px;
        border-radius: 18px;
        display: grid; place-items: center;
        background: linear-gradient(135deg, #6f8cff, #9d7bff);
        box-shadow: 0 10px 26px #6f8cff4d;
      }
      .mark svg { width: 28px; height: 28px; }

      h1 {
        color: #f4f6ff;
        font-size: 26px;
        font-weight: 700;
        margin-bottom: 6px;
        letter-spacing: -.01em;
      }
      .tagline {
        color: #aab4d6;
        font-size: 14px;
        line-height: 1.7;
        margin-bottom: 32px;
      }

      .choice-label {
        color: #7f8bb8;
        font-size: 11.5px;
        letter-spacing: .06em;
        text-transform: uppercase;
        margin-bottom: 14px;
      }

      .langs { display: grid; gap: 12px; }
      .lang-btn {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 17px 20px;
        border-radius: 16px;
        text-decoration: none;
        background: rgba(255,255,255,.05);
        border: 1px solid rgba(255,255,255,.12);
        color: #eef1ff;
        transition: transform .16s ease, background .16s ease, border-color .16s ease, box-shadow .16s ease;
      }
      .lang-btn:hover, .lang-btn:focus-visible {
        background: rgba(255,255,255,.1);
        border-color: rgba(255,255,255,.28);
        box-shadow: 0 14px 34px rgba(0,0,0,.35);
      }
      .lang-btn:active { transform: scale(.97); }

      .lang-left { display: flex; align-items: center; gap: 12px; }
      .flag {
        width: 38px; height: 38px; border-radius: 11px;
        display: grid; place-items: center;
        font-size: 17px; font-weight: 700;
        flex: none;
      }
      .flag.fa { background: linear-gradient(135deg,#3f8f6f,#2c6b52); color: #eafff4; }
      .flag.en { background: linear-gradient(135deg,#3b5fd9,#2c46a6); color: #eaf0ff; }

      .lang-text { text-align: right; }
      .lang-title { font-size: 15.5px; font-weight: 600; }
      .lang-sub { font-size: 12px; color: #9aa5cc; margin-top: 2px; }

      .chevron { flex: none; opacity: .6; transition: transform .16s ease; }
      .lang-btn:hover .chevron { transform: translateX(-3px); opacity: 1; }

      .en-block { direction: ltr; }
      .en-block .lang-text { text-align: left; }
      .en-block .chevron { transform: scaleX(-1); }
      .en-block:hover .chevron { transform: scaleX(-1) translateX(-3px); }

      .footnote {
        margin-top: 28px;
        font-size: 11.5px;
        color: #6c7699;
      }
    </style>
  </head>
  <body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <main class="card">
      <div class="mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 20A7 7 0 0 1 4 13H2a10 10 0 0 0 10 10z"/>
          <path d="M11 4A7 7 0 0 1 18 11h2A10 10 0 0 0 11 1z"/>
          <path d="M11 4a7 7 0 0 0-7 7H2a10 10 0 0 1 10-10z" opacity=".5"/>
        </svg>
      </div>
      <h1>مسیر من</h1>
      <p class="tagline">فضای خصوصی برای دیدن الگوها و بهترشدن، بدون قضاوت</p>

      <div class="choice-label">زبان را انتخاب کنید · Choose your language</div>
      <div class="langs">
        <a class="lang-btn" href="./persian/">
          <span class="lang-left">
            <span class="flag fa">فا</span>
            <span class="lang-text">
              <span class="lang-title">فارسی</span>
            </span>
          </span>
          <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#c4cbe8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </a>
        <a class="lang-btn en-block" href="./english/">
          <span class="lang-left">
            <span class="flag en">EN</span>
            <span class="lang-text">
              <span class="lang-title">English</span>
            </span>
          </span>
          <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#c4cbe8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </a>
      </div>

      <p class="footnote">اطلاعات حساب و یادداشت‌ها فقط در همین مرورگر نگهداری می‌شود.</p>
    </main>
  </body>
</html>
